name: MicroMart CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-verify:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: ['Cart', 'ConfigServer', 'EurekaServer', 'Gateway', 'Inventory', 'Notification', 'Order', 'Payment', 'Products', 'Users']

    steps:
      - name:  Checkout Repository
        uses: actions/checkout@v3

      - name: ☕ Set up JDK 17 (Temurin)
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Install shared library first so other services can find it
      - name: Install Shared JwtAuthorities Library
        working-directory: ./JwtAuthorities
        run: mvn clean install -DskipTests

      - name:  Build and Run Unit Tests [${{ matrix.service }}]
        working-directory: ./${{ matrix.service }}
        run: mvn clean package

      - name: Verify Docker Image Build [${{ matrix.service }}]
        working-directory: ./${{ matrix.service }}
        run: docker build -t micromart/${{ matrix.service }}:test .